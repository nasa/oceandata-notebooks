name: Build website
on:
  schedule:
   - cron: "16 8 * * 4"
  workflow_dispatch:
  workflow_call:
    inputs:
      upload:
        required: true
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: build
          environment-file: container/conda-lock.yml
          cache-environment-key: environment-${{ runner.os }}-${{ hashFiles('container/conda-lock.yml') }}
          init-shell: none
      - name: Finish micromamba setup
        shell: micromamba-shell {0}
        run: |
          micromamba install --name build --file container/conda-lock.yml --category jupyter
          micromamba install --name build --file container/conda-lock.yml --category tools
      - name: Fetch jcache
        id: jcache
        uses: actions/cache@v5
        with:
          path: docs/_cache
          key: jupyter-book-cache-${{ hashFiles('docs/_cache.dvc') }}
      - name: Update jcache
        if: steps.jcache.outputs.cache-hit != 'true'
        shell: micromamba-shell {0}
        run: dvc pull
        env:
          AWS_REGION: 'us-west-2'
          AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
          AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
          AWS_SESSION_TOKEN: '${{ secrets.AWS_SESSION_TOKEN }}'
      - name: Build jupyter book
        shell: micromamba-shell {0}
        run: jupyter-book build -W -n docs
      - name: Fix ampersand escape
        run: find docs/_build/html -name '*.html' -print0 | xargs -0 sed -i 's/&amp;amp;/\&amp;/g'
      - name: Upload html
        if: ${{ inputs.upload }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/_build/html
